# ── v0.2.0 additions — paste these blocks into your existing gateway.yaml ──

# Add at the top level (same level as `server:`, `admin:`, `routes:`)

auth:
  enabled: true
  # Path to PEM-encoded RSA public key.
  # Generate a test key pair with:
  #   openssl genrsa -out private.pem 2048
  #   openssl rsa -in private.pem -pubout -out public.pem
  public_key_path: "configs/public.pem"
  # Requests to these path prefixes bypass JWT validation entirely.
  skip_paths:
    - "/health"
    - "/healthz"
    - "/readyz"
    - "/metrics"

tracing:
  enabled: true
  # URL of the FastAPI trace collector (tracing/collector/).
  # Run locally: uvicorn collector:app --port 4317
  collector_url: "http://localhost:4317"
  service_name: "gateway-pro"
  # 1.0 = trace every request. Reduce for high-traffic production.
  sample_rate: 1.0


